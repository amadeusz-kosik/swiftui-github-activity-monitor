name: CI-Build
on:
  push:
    branches: [ master ]
jobs:
  build-test-deploy:
    runs-on: macos-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Build application itself
        run: xcodebuild clean build -scheme "swiftui-github-activity-monitor"
 
      - name: Build widget
        run: xcodebuild clean build -scheme "swiftui-github-activity-widgetExtension"

